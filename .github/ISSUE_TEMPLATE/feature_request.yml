name: Feature request
description: Suggest an addition or improvement.
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and discussions and didn't find this already proposed.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or pain point this feature addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about (or tried).

  - type: dropdown
    id: willing_to_contribute
    attributes:
      label: Willing to open a PR?
      options:
        - "Yes"
        - "No"
        - "Maybe, with guidance"
    validations:
      required: true
